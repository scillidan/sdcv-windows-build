name: Releases

on:
  schedule:
    # Monthly check for new upstream tags
    - cron: '0 8 1 * *'
  workflow_dispatch:
    inputs:
      upstream_tag:
        description: 'Upstream sdcv tag to build (leave empty for latest)'
        required: false
        type: string
      dryrun:
        description: 'Dry-run: build but skip release/artifact upload'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
 releases:
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout this repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false

      - name: Setup MSYS2 / MinGW64
        uses: msys2/setup-msys2@66cd2cce69caa17b53920067426061ca1de3a884  # v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-glib2
            mingw-w64-x86_64-readline
            mingw-w64-x86_64-zlib
            mingw-w64-x86_64-pcre2
            mingw-w64-x86_64-gettext
            mingw-w64-x86_64-github-cli
            git
            make
            zip

      - name: Determine upstream tag
        id: upstream
        env:
          INPUT_TAG: ${{ inputs.upstream_tag }}
        run: |
          if [ -n "$INPUT_TAG" ]; then
            UPSTREAM_TAG="$INPUT_TAG"
          else
            UPSTREAM_TAG=$(git ls-remote --tags https://github.com/Dushistov/sdcv.git \
              | awk -F/ '{print $3}' \
              | grep -v '\^{}' \
              | sort -V \
              | tail -1)
          fi
          echo "tag=$UPSTREAM_TAG" >> $GITHUB_OUTPUT
          echo "Upstream tag: $UPSTREAM_TAG"

      - name: Check if release already exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.upstream.outputs.tag }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Release $TAG already exists, will skip."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Build with Makefile
        if: steps.check.outputs.skip == 'false' || inputs.dryrun
        run: make SDCV_TAG="${{ steps.upstream.outputs.tag }}" CMAKE_BUILD_TYPE=Release ENABLE_NLS=OFF WITH_READLINE=OFF

      - name: Upload build artifact
        if: success() && !inputs.dryrun && steps.check.outputs.skip == 'false'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: sdcv-windows-build
          path: dist/

      - name: Create GitHub Release
        if: success() && !inputs.dryrun && steps.check.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.upstream.outputs.tag }}"
          VERSION="${TAG#v}"
          gh release create "$TAG" \
            dist/sdcv-windows-x64-${VERSION}.zip \
            --title "$TAG" \
            --notes " "